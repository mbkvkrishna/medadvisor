<!DOCTYPE html>
<html>
<head>
    <title>MedAdvisor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
    <div class="logo-area">
        <img src="https://cdn-icons-png.flaticon.com/512/2966/2966483.png" class="logo">
        <h2>MedAdvisor</h2>
    </div>
    <div class="toggle" onclick="toggleMode()">Toggle Theme</div>
</header>

<div class="container">
    <img src="{{ url_for('static', filename='back.png') }}" class="hero-img">
    <form id="diseaseForm">
        <div class="autocomplete-wrapper">
            <input type="text" id="disease" placeholder="Enter Disease Name" autocomplete="off" required>
            <ul id="suggestions" class="suggestions-list"></ul>
        </div>
        <input type="number" id="age" min="1" max="120" placeholder="Enter Age" required>
        <select id="gender" required>
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>
        <button type="submit">Get Medicine Recommendation</button>
    </form>
</div>

<script src="/static/main.js"></script>
</body>
</html>
