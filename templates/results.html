<!DOCTYPE html>
<html>
<head>
    <title>Results - MedAdvisor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
    <div class="logo-area">
        <img src="https://cdn-icons-png.flaticon.com/512/2966/2966483.png" class="logo">
        <h2>MedAdvisor</h2>
    </div>
    <div class="header-actions">
        {% if user %}
            <span class="welcome">Welcome, {{ user.display_name }}</span>
            <a href="/logout" class="link-btn">Logout</a>
        {% else %}
            <a href="/login" class="link-btn">Login</a>
            <a href="/signup" class="link-btn">Signup</a>
        {% endif %}
        <div class="toggle" onclick="toggleMode()">Toggle Theme</div>
    </div>
</header>

<div class="container">
    <div id="result"></div>
    <button onclick="saveBookmark()">Save Bookmark</button>
    <div class="home-btn">
        <a href="/">Back to Home</a>
    </div>
</div>

<script src="/static/main.js"></script>
</body>
</html>
